<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文章库 — Wechat MD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css?v=20260331f">
</head>
<body>
  <nav class="top-nav">
    <div class="logo">Wechat <span>MD</span></div>
    <a class="nav-item" href="/">转换</a>
    <a class="nav-item" href="/sync">同步源</a>
    <a class="nav-item active" href="/articles">文章库</a>
    <a class="nav-item" href="/settings">设置</a>
    <div class="theme-switcher"><button class="theme-btn" id="theme-toggle" title="切换主题"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button><div class="theme-dropdown hidden" id="theme-dropdown"><button class="theme-option" data-theme-value="warm-minimal"><span class="theme-dot" style="background:#3D8B5E;"></span>Warm Minimal<span class="theme-check">&#10003;</span></button><button class="theme-option" data-theme-value="terracotta"><span class="theme-dot" style="background:#C67B5C;"></span>Terracotta<span class="theme-check">&#10003;</span></button><button class="theme-option" data-theme-value="ocean-dark"><span class="theme-dot" style="background:#EA580C;"></span>Ocean Dark<span class="theme-check">&#10003;</span></button><button class="theme-option" data-theme-value="ink"><span class="theme-dot" style="background:#2563EB;"></span>Ink<span class="theme-check">&#10003;</span></button></div></div><button id="logout-btn" class="nav-item logout">退出</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>文章库</h1>
      <p>查看已同步到本地索引的公众号文章，按状态筛选，并批量加入清洗/润色/入库队列。</p>
    </div>

    <div class="card">
      <h2 class="card-title">筛选与批量操作</h2>
      <div class="field-row">
        <div class="field">
          <label for="filter-account">公众号</label>
          <select id="filter-account"><option value="">全部</option></select>
        </div>
        <div class="field">
          <label for="filter-process-status">处理状态</label>
          <select id="filter-process-status">
            <option value="">全部</option>
            <option value="pending">待处理</option>
            <option value="running">处理中</option>
            <option value="success">成功</option>
            <option value="error">失败</option>
          </select>
        </div>
        <div class="field">
          <label for="filter-ingested">入库状态</label>
          <select id="filter-ingested">
            <option value="">全部</option>
            <option value="true">已入库</option>
            <option value="false">未入库</option>
          </select>
        </div>
        <div class="field">
          <label for="filter-has-execution">执行记录</label>
          <select id="filter-has-execution">
            <option value="">全部</option>
            <option value="true">有执行记录</option>
            <option value="false">仅索引未执行</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="filter-start-date">发布时间开始</label>
          <input id="filter-start-date" type="date">
        </div>
        <div class="field">
          <label for="filter-end-date">发布时间结束</label>
          <input id="filter-end-date" type="date">
        </div>
      </div>
      <label class="check-row" style="margin-top:8px;">
        <input id="ingest-skip-ingested" type="checkbox" checked>
        跳过已入库文章
      </label>
      <div class="action-row">
        <button id="refresh-articles" class="btn btn-secondary">刷新列表</button>
        <button id="select-filtered" class="btn btn-ghost">全选当前筛选结果</button>
        <button id="clear-selection" class="btn btn-ghost">清空选择</button>
        <button id="delete-selected" class="btn btn-danger">删除记录</button>
        <button id="ingest-selected" class="btn btn-primary">批量加入处理队列</button>
      </div>
      <div id="articles-result-area"></div>
    </div>

    <div class="card">
      <h2 class="card-title">全局执行计划</h2>
      <p class="card-desc">只处理文章库中“未执行”的文章；是否启用 AI 仍由设置页全局配置决定。</p>
      <div class="field-row">
        <div class="field">
          <label for="article-ingest-interval">运行间隔（小时）</label>
          <input id="article-ingest-interval" type="number" min="1" max="720" value="24" placeholder="例如，24 小时代表每天">
        </div>
      </div>
      <label class="check-row" style="margin-bottom:12px;">
        <input id="article-ingest-enabled" type="checkbox">
        启用全局执行计划
      </label>
      <div class="action-row">
        <button id="save-article-ingest-schedule" class="btn btn-primary">保存执行计划</button>
      </div>
      <div id="article-ingest-schedule-area"></div>
    </div>

    <div class="card">
      <h2 class="card-title">文章列表</h2>
      <div style="overflow:auto;">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr>
              <th style="text-align:left; padding:10px 8px;">选择</th>
              <th style="text-align:left; padding:10px 8px;">标题</th>
              <th style="text-align:left; padding:10px 8px;">公众号</th>
              <th style="text-align:left; padding:10px 8px;">发布时间</th>
              <th style="text-align:left; padding:10px 8px;">抓取状态</th>
              <th style="text-align:left; padding:10px 8px;">处理状态</th>
              <th style="text-align:left; padding:10px 8px;">最近执行</th>
              <th style="text-align:left; padding:10px 8px;">入库</th>
              <th style="text-align:left; padding:10px 8px;">链接</th>
            </tr>
          </thead>
          <tbody id="articles-table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">执行历史</h2>
      <p class="card-desc">查看单篇文章最近的执行尝试，包括单链转换、批量入队后的执行，以及重跑记录。</p>
      <div id="article-execution-area" class="text-muted">点击上方“查看执行”后加载。</div>
    </div>
  </div>

  <script src="/assets/admin.js?v=20260331f"></script>
  <script>
    const state = { items: [], sources: [], ingestJobId: "", schedules: {}, filteredSelection: false };
    const initialParams = new URLSearchParams(window.location.search);
    let ingestCountdownInterval = null;

    function updateIngestCountdown() {
      const schedule = state.schedules.article_ingest_schedule;
      const el = document.getElementById("dynamic-article-countdown");
      if (!el) return;
      if (!schedule || !schedule.enabled) {
         el.textContent = "未开启自动执行";
         return;
      }
      const interval_hours = schedule.interval_hours || 24;
      if (!schedule.last_run_at) {
         el.textContent = "暂无可用的历史记录（将很快触发）";
         return;
      }
      const lastRun = new Date(schedule.last_run_at).getTime();
      const intervalMs = interval_hours * 3600 * 1000;
      const nextRun = lastRun + intervalMs;
      const now = Date.now();
      if (now >= nextRun) {
         el.textContent = "已到达时间，等待后台调度执行...";
         return;
      }
      const diffMs = nextRun - now;
      const h = Math.floor(diffMs / 3600000);
      const m = Math.floor((diffMs % 3600000) / 60000).toString().padStart(2, '0');
      const s = Math.floor((diffMs % 60000) / 1000).toString().padStart(2, '0');
      el.textContent = `${h}时 ${m}分 ${s}秒`;
    }

    function startIngestCountdown() {
       if (ingestCountdownInterval) clearInterval(ingestCountdownInterval);
       updateIngestCountdown();
       ingestCountdownInterval = setInterval(updateIngestCountdown, 1000);
    }

    function dateToTimestamp(inputId, isEnd) {
      const value = document.getElementById(inputId).value;
      if (!value) return null;
      const suffix = isEnd ? "T23:59:59Z" : "T00:00:00Z";
      return Math.floor(new Date(`${value}${suffix}`).getTime() / 1000);
    }

    function formatTimestamp(value) {
      if (!value) return "-";
      return new Date(value * 1000).toLocaleString("zh-CN", { hour12: false });
    }

    function formatLocalDateTime(value) {
      if (!value) return "-";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleString("zh-CN", {
        hour12: false,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      }).replace(/\//g, "-");
    }

    function buildFilters() {
      return {
        account_fakeid: document.getElementById("filter-account").value || "",
        process_status: document.getElementById("filter-process-status").value || "",
        is_ingested: document.getElementById("filter-ingested").value === "" ? null : document.getElementById("filter-ingested").value === "true",
        has_execution: document.getElementById("filter-has-execution").value === "" ? null : document.getElementById("filter-has-execution").value === "true",
        published_from: dateToTimestamp("filter-start-date", false),
        published_to: dateToTimestamp("filter-end-date", true),
        source_id: initialParams.get("source_id") || "",
        sync_run_id: initialParams.get("sync_run_id") || "",
      };
    }

    function getSelectionPayload() {
      if (state.filteredSelection) {
        return { mode: "filtered", filters: buildFilters() };
      }
      const articleIds = Array.from(document.querySelectorAll(".article-selector:checked")).map((node) => node.value);
      return { mode: "ids", article_ids: articleIds };
    }

    function renderAccountsFilter() {
      const select = document.getElementById("filter-account");
      select.innerHTML = `<option value="">全部</option>` + state.sources.map((item) => `<option value="${item.account_fakeid}">${AdminUI.escapeHtml(item.account_name || item.account_fakeid || "-")}</option>`).join("");
    }

    function renderSchedule(schedule) {
      if (!schedule) return;
      document.getElementById("article-ingest-enabled").checked = Boolean(schedule.enabled);
      document.getElementById("article-ingest-interval").value = String(schedule.interval_hours || 24);
      AdminUI.setHtml("article-ingest-schedule-area", AdminUI.resultHtml({
        title: schedule.enabled ? "执行计划已启用" : "执行计划未启用",
        tone: schedule.enabled ? "success" : "info",
        items: [
          { label: "执行间隔", value: `${schedule.interval_hours || 24} 小时` },
          { label: "最近执行", value: formatLocalDateTime(schedule.last_run_at) },
          { label: "最近状态", value: schedule.last_status || "-" },
        ],
        json: schedule.recent_runs || [],
      }));
      const resultItems = document.querySelector("#article-ingest-schedule-area .result-items");
      if (resultItems) {
         resultItems.insertAdjacentHTML("beforeend", `<div class="result-item"><span class="label">下次执行还剩</span><span class="value" id="dynamic-article-countdown" style="font-variant-numeric: tabular-nums; color: var(--color-primary); font-weight: bold;">计算中...</span></div>`);
      }
      startIngestCountdown();
    }

    function renderArticleRows() {
      const body = document.getElementById("articles-table-body");
      body.innerHTML = "";
      state.items.forEach((item) => {
        const latestExecution = item.latest_execution || null;
        const latestExecutionText = latestExecution
          ? `${latestExecution.status || "-"} / ${latestExecution.trigger_channel || "-"}`
          : "未执行";
        const row = document.createElement("tr");
        row.innerHTML = `
          <td style="padding:10px 8px;"><input type="checkbox" class="article-selector" value="${AdminUI.escapeHtml(item.id)}" ${state.filteredSelection ? "checked" : ""}></td>
          <td style="padding:10px 8px;">${AdminUI.escapeHtml(item.title || "-")}</td>
          <td style="padding:10px 8px;">${AdminUI.escapeHtml(item.account_name || "-")}</td>
          <td style="padding:10px 8px;">${AdminUI.escapeHtml(formatTimestamp(item.publish_time))}</td>
          <td style="padding:10px 8px;">${AdminUI.escapeHtml(item.fetch_status || "-")}</td>
          <td style="padding:10px 8px;">${AdminUI.escapeHtml(item.process_status || "-")}</td>
          <td style="padding:10px 8px;">
            <div>${AdminUI.escapeHtml(latestExecutionText)}</div>
            <button class="btn btn-ghost article-history-btn" data-article-id="${AdminUI.escapeHtml(item.id)}" style="margin-top:6px;">查看执行</button>
          </td>
          <td style="padding:10px 8px;">${item.is_ingested ? "已入库" : "未入库"}</td>
          <td style="padding:10px 8px;"><a href="${AdminUI.escapeHtml(item.article_url || "#")}" target="_blank" rel="noreferrer">查看链接</a></td>
        `;
        body.appendChild(row);
      });
      document.querySelectorAll(".article-selector").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) {
            state.filteredSelection = false;
          }
        });
      });
      document.querySelectorAll(".article-history-btn").forEach((button) => {
        button.addEventListener("click", () => loadArticleExecutions(button.getAttribute("data-article-id")));
      });
    }

    async function loadSources() {
      const res = await fetch("/api/sync/sources");
      const data = await res.json();
      state.sources = data.items || [];
      renderAccountsFilter();
    }

    async function loadArticles() {
      const params = new URLSearchParams();
      const filters = buildFilters();
      if (filters.account_fakeid) params.set("account_fakeid", filters.account_fakeid);
      if (filters.process_status) params.set("process_status", filters.process_status);
      if (filters.is_ingested != null) params.set("is_ingested", String(filters.is_ingested));
      if (filters.has_execution != null) params.set("has_execution", String(filters.has_execution));
      if (filters.published_from != null) params.set("published_from", String(filters.published_from));
      if (filters.published_to != null) params.set("published_to", String(filters.published_to));
      if (filters.source_id) params.set("source_id", filters.source_id);
      if (filters.sync_run_id) params.set("sync_run_id", filters.sync_run_id);
      params.set("limit", "200");
      const res = await fetch(`/api/sync/articles?${params.toString()}`);
      const data = await res.json();
      if (!res.ok) {
        AdminUI.toast(data.detail || "文章列表加载失败", "error");
        return;
      }
      state.items = data.items || [];
      renderArticleRows();
      AdminUI.setHtml("articles-result-area", AdminUI.resultHtml({
        title: state.filteredSelection ? "当前为全选筛选结果模式" : "文章列表已刷新",
        tone: "info",
        description: `当前筛选共 ${data.total || 0} 条记录，页面加载 ${state.items.length || 0} 条。`,
      }));
    }

    async function loadArticleExecutions(articleId) {
      const res = await fetch(`/api/sync/articles/${articleId}/executions?limit=20`);
      const data = await res.json();
      if (!res.ok) {
        AdminUI.toast(data.detail || "执行历史加载失败", "error");
        return;
      }
      const html = AdminUI.resultHtml({
        title: "文章执行历史",
        tone: "info",
        description: `共 ${data.total || 0} 条执行记录。`,
        json: data,
      });
      AdminUI.setHtml("article-execution-area", html);
    }

    async function pollIngestJob(jobId) {
      state.ingestJobId = jobId;
      const res = await fetch(`/api/sync/ingest-jobs/${jobId}`);
      const data = await res.json();
      if (!res.ok) {
        return;
      }
      AdminUI.setHtml("articles-result-area", AdminUI.resultHtml({
        title: "批量入库任务",
        tone: data.status === "completed" ? "success" : data.status === "error" ? "warn" : "info",
        description: `已完成 ${data.completed || 0}/${data.total || 0}，成功 ${data.success_count || 0}，失败 ${data.failure_count || 0}。`,
        json: data,
      }));
      if (data.status === "running" || data.status === "queued") {
        setTimeout(() => pollIngestJob(jobId), 1500);
      } else {
        await loadArticles();
      }
    }

    async function loadSchedules() {
      const res = await fetch("/api/admin/schedules");
      const data = await res.json();
      if (!res.ok) {
        AdminUI.toast(data.detail || "执行计划读取失败", "error");
        return;
      }
      state.schedules = data;
      renderSchedule(data.article_ingest_schedule || null);
    }

    document.getElementById("ingest-selected").addEventListener("click", async () => {
      const selection = getSelectionPayload();
      if (selection.mode === "ids" && !(selection.article_ids || []).length) {
        AdminUI.toast("请先选择文章", "warn");
        return;
      }
      const res = await fetch("/api/sync/articles/ingest", {
        method: "POST",
        headers: AdminUI.buildJsonHeaders(),
        body: JSON.stringify({
          selection,
          output_target: "fns",
          skip_ingested: document.getElementById("ingest-skip-ingested").checked,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        AdminUI.toast(data.detail || "批量入队失败", "error");
        return;
      }
      AdminUI.toast("批量入队已创建", "success");
      await pollIngestJob(data.id);
    });

    document.getElementById("delete-selected").addEventListener("click", async () => {
      const selection = getSelectionPayload();
      if (selection.mode === "ids" && !(selection.article_ids || []).length) {
        AdminUI.toast("请先选择文章", "warn");
        return;
      }
      const res = await fetch("/api/sync/articles/delete", {
        method: "POST",
        headers: AdminUI.buildJsonHeaders(),
        body: JSON.stringify({ selection }),
      });
      const data = await res.json();
      if (!res.ok) {
        AdminUI.toast(data.detail || "删除记录失败", "error");
        return;
      }
      state.filteredSelection = false;
      AdminUI.toast("记录已删除", "success");
      AdminUI.setHtml("articles-result-area", AdminUI.resultHtml({
        title: "删除完成",
        tone: "success",
        items: [{ label: "删除数量", value: data.deleted_count || 0 }],
        json: data,
      }));
      await loadArticles();
    });

    document.getElementById("select-filtered").addEventListener("click", async () => {
      state.filteredSelection = true;
      document.querySelectorAll(".article-selector").forEach((node) => { node.checked = true; });
      const params = new URLSearchParams();
      const filters = buildFilters();
      if (filters.account_fakeid) params.set("account_fakeid", filters.account_fakeid);
      if (filters.process_status) params.set("process_status", filters.process_status);
      if (filters.is_ingested != null) params.set("is_ingested", String(filters.is_ingested));
      if (filters.has_execution != null) params.set("has_execution", String(filters.has_execution));
      if (filters.published_from != null) params.set("published_from", String(filters.published_from));
      if (filters.published_to != null) params.set("published_to", String(filters.published_to));
      if (filters.source_id) params.set("source_id", filters.source_id);
      if (filters.sync_run_id) params.set("sync_run_id", filters.sync_run_id);
      params.set("limit", "1");
      const res = await fetch(`/api/sync/articles?${params.toString()}`);
      const data = await res.json();
      AdminUI.setHtml("articles-result-area", AdminUI.resultHtml({
        title: "已全选当前筛选结果",
        tone: "success",
        description: `后续批量执行或删除会作用于当前筛选命中的全部 ${data.total || 0} 条记录，而不只是本页可见文章。`,
      }));
    });

    document.getElementById("clear-selection").addEventListener("click", () => {
      state.filteredSelection = false;
      document.querySelectorAll(".article-selector").forEach((node) => { node.checked = false; });
      AdminUI.toast("已清空选择", "info");
    });

    document.getElementById("save-article-ingest-schedule").addEventListener("click", async () => {
      const res = await fetch("/api/admin/schedules", {
        method: "PUT",
        headers: AdminUI.buildJsonHeaders(),
        body: JSON.stringify({
          article_ingest_schedule: {
            enabled: document.getElementById("article-ingest-enabled").checked,
            interval_hours: Number(document.getElementById("article-ingest-interval").value) || 24,
          },
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        AdminUI.toast(data.detail || "保存执行计划失败", "error");
        return;
      }
      AdminUI.toast("执行计划已保存", "success");
      state.schedules.article_ingest_schedule = data.article_ingest_schedule || null;
      renderSchedule(data.article_ingest_schedule || null);
    });

    document.getElementById("refresh-articles").addEventListener("click", loadArticles);
    document.getElementById("filter-account").addEventListener("change", loadArticles);
    document.getElementById("filter-process-status").addEventListener("change", loadArticles);
    document.getElementById("filter-ingested").addEventListener("change", loadArticles);
    document.getElementById("filter-has-execution").addEventListener("change", loadArticles);
    document.getElementById("filter-start-date").addEventListener("change", loadArticles);
    document.getElementById("filter-end-date").addEventListener("change", loadArticles);

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/session", { method: "DELETE" });
      window.location.href = "/login";
    });

    loadSources().then(loadArticles);
    loadSchedules();
  </script>
</body>
</html>
