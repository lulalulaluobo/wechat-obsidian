<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>转换中心 — Wechat MD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css?v=20260331f">
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav">
    <div class="logo">Wechat <span>MD</span></div>
    <a class="nav-item active" href="/">转换</a>
    <a class="nav-item" href="/sync">同步源</a>
    <a class="nav-item" href="/articles">文章库</a>
    <a class="nav-item" href="/settings">设置</a>
    <div class="theme-switcher"><button class="theme-btn" id="theme-toggle" title="切换主题"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button><div class="theme-dropdown hidden" id="theme-dropdown"><button class="theme-option" data-theme-value="warm-minimal"><span class="theme-dot" style="background:#3D8B5E;"></span>Warm Minimal<span class="theme-check">&#10003;</span></button><button class="theme-option" data-theme-value="terracotta"><span class="theme-dot" style="background:#C67B5C;"></span>Terracotta<span class="theme-check">&#10003;</span></button><button class="theme-option" data-theme-value="ocean-dark"><span class="theme-dot" style="background:#EA580C;"></span>Ocean Dark<span class="theme-check">&#10003;</span></button><button class="theme-option" data-theme-value="ink"><span class="theme-dot" style="background:#2563EB;"></span>Ink<span class="theme-check">&#10003;</span></button></div></div><button id="logout-btn" class="nav-item logout">退出</button>
  </nav>

  <div class="page">
    <!-- Status Bar -->
    <div class="page-header" style="margin-bottom:12px;">
      <h1>转换中心</h1>
      <p>支持微信公众号，普通网页会尽力抓取；若目标站点无法抓取，会明确提示失败原因。</p>
    </div>

    <div class="card" style="padding:16px 20px;">
      <h2 class="card-title" style="font-size:18px; margin-bottom:10px;">工作台概览</h2>
      <p class="card-desc" style="margin-bottom:12px;">当前 FNS 目标、图片模式和快速状态。</p>
      <h3 class="card-title" style="font-size:15px; margin-bottom:0;">系统状态</h3>
      <p class="card-desc" style="margin-top:6px;">转换前可以先检查当前同步环境。</p>
    
    <div class="status-bar" id="status-bar">
      <div class="status-chip"><span class="dot" id="dot-fns"></span><span id="chip-fns">FNS 未检测</span></div>
      <div class="status-chip"><span id="chip-vault">Vault: -</span></div>
      <div class="status-chip"><span id="chip-image">图片: 微信原链</span></div>
      <div class="status-chip"><span id="chip-ai">AI: 未启用</span></div>
    </div>
    </div>

    <!-- Single Convert Card -->
    <div class="card">
      <h2 class="card-title">单篇转换</h2>
      <p class="card-desc">粘贴一条公众号链接，或普通网页链接开始转换。高风险站点不保证成功率。</p>

      <div class="field">
        <label for="single-url">文章链接</label>
        <input id="single-url" placeholder="https://mp.weixin.qq.com/s/... 或 https://your-host/article">
      </div>

      <button class="advanced-toggle" data-toggle-advanced="single-advanced" aria-expanded="false">
        <span class="arrow">▸</span> 高级选项
      </button>
      <div id="single-advanced" class="advanced-panel">
        <div class="field-row">
          <div class="field mb-0">
            <label for="single-timeout">超时秒数</label>
            <input id="single-timeout" type="number" value="30">
          </div>
          <div class="field mb-0">
            <label>&nbsp;</label>
            <label class="check-row">
              <input id="single-save-html" type="checkbox">
              保留 HTML（调试用）
            </label>
          </div>
        </div>
        <label class="check-row" style="margin-top:10px;">
          <input id="single-ai-enabled" type="checkbox">
          本次启用 AI 润色
        </label>
      </div>

      <div class="action-row mt-0">
        <button id="single-paste" class="btn btn-ghost">粘贴</button>
        <button id="single-submit" class="btn btn-primary">执行转换</button>
        <button id="check-fns-btn" class="btn btn-secondary">检测 FNS</button>
      </div>

      <div id="single-result-area"></div>
    </div>

    <!-- Batch Convert Card -->
    <div class="card">
      <h2 class="card-title">批量转换</h2>
      <p class="card-desc">每行一条公众号链接或普通网页链接；导入文件也遵循相同规则。</p>

      <div class="field">
        <label for="batch-urls">文章链接</label>
        <textarea id="batch-urls" placeholder="每行一个公众号链接或普通网页链接&#10;https://mp.weixin.qq.com/s/...&#10;https://your-host/article"></textarea>
      </div>
      <div class="field">
        <label for="batch-file">导入文件（txt / md / csv）</label>
        <input id="batch-file" type="file">
      </div>

      <button class="advanced-toggle" data-toggle-advanced="batch-advanced" aria-expanded="false">
        <span class="arrow">▸</span> 高级选项
      </button>
      <div id="batch-advanced" class="advanced-panel">
        <div class="field-row">
          <div class="field mb-0">
            <label for="batch-timeout">超时秒数</label>
            <input id="batch-timeout" type="number" value="30">
          </div>
          <div class="field mb-0">
            <label>&nbsp;</label>
            <label class="check-row">
              <input id="batch-save-html" type="checkbox">
              保留 HTML（调试用）
            </label>
          </div>
        </div>
        <label class="check-row" style="margin-top:10px;">
          <input id="batch-ai-enabled" type="checkbox">
          本次启用 AI 润色
        </label>
      </div>

      <div class="action-row mt-0">
        <button id="batch-submit" class="btn btn-secondary">创建批量任务</button>
      </div>

      <h3 class="card-title" style="font-size:15px; margin-top:18px;">任务摘要</h3>
      <p class="card-desc">批量任务会在这里显示进度和状态。</p>
      <div id="batch-result-area"></div>
    </div>

    <div class="card">
      <h2 class="card-title">最近结果</h2>
      <p class="card-desc">单篇转换完成后，会先在这里展示结构化摘要和原始 JSON。</p>
    </div>
  </div>

  <script src="/assets/admin.js?v=20260331f"></script>
  <script>

    function imageModeLabel(mode) {
      return mode === "s3_hotlink" ? "S3 图床外链" : "微信原链";
    }

    function aiModeLabel(config) {
      if (!config?.ai_enabled) return "未启用";
      return `已启用 / ${config.ai_model || "-"}`;
    }

    function extractSupportedLink(text) {
      const matches = String(text || "").match(/https?:\/\/[^\s<>\"]+/ig) || [];
      return matches[0] || "";
    }

    /* ── Load Config ── */
    async function loadConfig() {
      try {
        const res = await fetch("/api/config");
        const data = await res.json();
        AdminUI.setText("chip-fns", `FNS: ${data.fns_base_url || "未配置"}`);
        AdminUI.setText("chip-vault", `Vault: ${data.fns_vault || "未配置"}`);
        AdminUI.setText("chip-image", `图片: ${imageModeLabel(data.image_mode)}`);
        AdminUI.setText("chip-ai", `AI: ${aiModeLabel(data)}`);
        document.getElementById("dot-fns").className = `dot ${data.fns_enabled ? "ok" : "warn"}`;
        document.getElementById("single-ai-enabled").checked = Boolean(data.ai_enabled);
        document.getElementById("batch-ai-enabled").checked = Boolean(data.ai_enabled);
      } catch (err) {
        AdminUI.setText("chip-fns", "FNS: 读取失败");
        document.getElementById("dot-fns").className = "dot err";
      }
    }

    /* ── Check FNS ── */
    document.getElementById("check-fns-btn").addEventListener("click", async () => {
      const btn = document.getElementById("check-fns-btn");
      btn.disabled = true;
      btn.textContent = "检测中…";
      try {
        const res = await fetch("/api/admin/fns-status");
        const data = await res.json();
        if (data.connected && data.vault_exists) {
          document.getElementById("dot-fns").className = "dot ok";
          AdminUI.setText("chip-fns", `FNS: ${data.base_url || "已连接"}`);
          AdminUI.toast("FNS 连接正常", "success");
          AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
            title: "FNS 连接正常",
            tone: "success",
            description: data.message || "目标 Vault 可正常写入。",
            items: [
              { label: "服务地址", value: data.base_url || "-" },
              { label: "Vault", value: data.vault_name || "-" },
            ],
            json: data,
          }));
        } else if (data.connected) {
          document.getElementById("dot-fns").className = "dot warn";
          AdminUI.toast(data.message || "连接正常但目标 Vault 异常", "warn");
          AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
            title: "FNS 目标异常", tone: "warn",
            description: data.message || "请确认 Vault 名称。",
            items: [
              { label: "服务地址", value: data.base_url || "-" },
              { label: "Vault", value: data.vault_name || "-" },
            ],
            json: data,
          }));
        } else {
          document.getElementById("dot-fns").className = "dot err";
          AdminUI.toast(data.message || "FNS 连接失败", "error");
          AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
            title: "FNS 连接失败", tone: "error",
            description: data.message || "请检查配置。",
            json: data,
          }));
        }
      } catch (err) {
        document.getElementById("dot-fns").className = "dot err";
        AdminUI.toast("检测失败: " + err, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "检测 FNS";
      }
    });

    document.getElementById("single-paste").addEventListener("click", async () => {
      try {
        const text = await navigator.clipboard.readText();
        const url = extractSupportedLink(text);
        if (!url) {
          AdminUI.toast("剪贴板中未识别到可用链接", "warn");
          return;
        }
        document.getElementById("single-url").value = url;
        AdminUI.toast("已从剪贴板填入文章链接", "success");
      } catch (err) {
        AdminUI.toast("读取剪贴板失败，请手动粘贴", "error");
      }
    });

    /* ── Single Convert ── */
    document.getElementById("single-submit").addEventListener("click", async () => {
      const url = document.getElementById("single-url").value.trim();
      if (!url) { AdminUI.toast("请输入文章链接", "warn"); return; }
      const btn = document.getElementById("single-submit");
      btn.disabled = true;
      btn.textContent = "转换中…";
      AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
        title: "正在处理", tone: "info",
        description: "单篇任务提交中，请稍候…",
      }));

      try {
        const res = await fetch("/api/convert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url,
            timeout: Number(document.getElementById("single-timeout").value || 30),
            save_html: document.getElementById("single-save-html").checked,
            ai_enabled: document.getElementById("single-ai-enabled").checked,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById("single-url").value = "";
          AdminUI.toast("转换成功", "success");
          AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
            title: data.result?.title || "转换完成",
            tone: "success",
            description: "文章已完成转换并同步。",
            items: [
              { label: "同步路径", value: data.sync?.path || data.sync?.markdown_file || "-" },
              { label: "同步类型", value: data.sync?.target || data.output_target || "-" },
              { label: "图片模式", value: imageModeLabel(data.result?.image_mode) },
              { label: "AI 润色", value: data.ai_polish?.enabled ? `${data.ai_polish?.status || "-"} / ${data.ai_polish?.model || "-"}` : "未启用" },
            ],
            json: data,
          }));
        } else {
          AdminUI.toast("转换失败", "error");
          AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
            title: "转换失败", tone: "error",
            description: data.detail || "请求失败",
            json: data,
          }));
        }
      } catch (err) {
        AdminUI.toast("网络错误", "error");
        AdminUI.setHtml("single-result-area", AdminUI.resultHtml({
          title: "网络错误", tone: "error", description: String(err),
        }));
      } finally {
        btn.disabled = false;
        btn.textContent = "执行转换";
      }
    });

    /* ── Batch Convert ── */
    async function pollJob(jobId) {
      let keepPolling = true;
      while (keepPolling) {
        const res = await fetch(`/api/jobs/${jobId}`);
        const data = await res.json();
        const tone = data.status === "completed"
          ? (data.failure_count > 0 ? "warn" : "success")
          : "info";
        AdminUI.setHtml("batch-result-area", AdminUI.resultHtml({
          title: `任务 ${data.job_id || "-"}`,
          tone,
          description: data.status === "completed" ? "批量任务已结束。" : "批量任务执行中…",
          items: [
            { label: "状态", value: data.status || "-" },
            { label: "总数", value: data.total ?? "-" },
            { label: "已完成", value: data.completed ?? "-" },
            { label: "成功 / 失败", value: `${data.success_count ?? 0} / ${data.failure_count ?? 0}` },
          ],
          json: data,
        }));
        keepPolling = data.status === "queued" || data.status === "running";
        if (keepPolling) await new Promise((r) => setTimeout(r, 1500));
      }
      AdminUI.toast("批量任务完成", "success");
    }

    document.getElementById("batch-submit").addEventListener("click", async () => {
      const btn = document.getElementById("batch-submit");
      btn.disabled = true;
      btn.textContent = "提交中…";

      const formData = new FormData();
      formData.append("urls_text", document.getElementById("batch-urls").value);
      formData.append("timeout", document.getElementById("batch-timeout").value || "30");
      formData.append("save_html", document.getElementById("batch-save-html").checked ? "true" : "false");
      formData.append("ai_enabled", document.getElementById("batch-ai-enabled").checked ? "true" : "false");
      const fileInput = document.getElementById("batch-file");
      if (fileInput.files[0]) formData.append("file", fileInput.files[0]);

      try {
        const res = await fetch("/api/batch", { method: "POST", body: formData });
        const data = await res.json();
        if (res.ok && data.job_id) {
          document.getElementById("batch-urls").value = "";
          fileInput.value = "";
          AdminUI.toast(`批量任务已创建: ${data.total} 篇`, "success");
          AdminUI.setHtml("batch-result-area", AdminUI.resultHtml({
            title: "任务已创建", tone: "info",
            items: [{ label: "总数", value: data.total }, { label: "任务 ID", value: data.job_id }],
            json: data,
          }));
          pollJob(data.job_id);
        } else {
          AdminUI.toast("创建失败", "error");
          AdminUI.setHtml("batch-result-area", AdminUI.resultHtml({
            title: "创建失败", tone: "error",
            description: data.detail || "请检查链接内容",
            json: data,
          }));
        }
      } catch (err) {
        AdminUI.toast("网络错误", "error");
        AdminUI.setHtml("batch-result-area", AdminUI.resultHtml({
          title: "网络错误", tone: "error", description: String(err),
        }));
      } finally {
        btn.disabled = false;
        btn.textContent = "创建批量任务";
      }
    });

    /* ── Logout ── */
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/session", { method: "DELETE" });
      window.location.href = "/login";
    });

    /* ── Init ── */
    loadConfig();
  </script>
</body>
</html>
