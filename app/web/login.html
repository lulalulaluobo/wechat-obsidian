<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 — Wechat MD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css?v=20260331f">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <div class="logo-section">
        <h1>Wechat <span>MD</span></h1>
        <p>管理后台登录</p>
        <p class="text-muted" style="margin-top:8px;">同步服务管理台，用于微信公众号文章转换与同步。</p>
      </div>

      <div class="field">
        <label for="username">用户名</label>
        <input id="username" name="wechat-md-username" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="admin">
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input id="password" name="wechat-md-password" type="password" autocomplete="new-password" placeholder="输入管理员密码">
      </div>

      <div class="action-row" style="margin-top:20px;">
        <button id="login-submit" class="btn btn-primary" style="width:100%;">登录</button>
      </div>

      <div id="login-result-area"></div>
    </div>
  </main>

  <script src="/assets/admin.js?v=20260331f"></script>
  <script>
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    function resetLoginFields() {
      passwordInput.value = "";
      passwordInput.setAttribute("value", "");
    }

    window.addEventListener("pageshow", resetLoginFields);
    window.addEventListener("load", () => {
      resetLoginFields();
      usernameInput.focus();
    });

    document.getElementById("login-submit").addEventListener("click", async () => {
      const btn = document.getElementById("login-submit");
      btn.disabled = true;
      btn.textContent = "登录中…";

      try {
        const response = await fetch("/api/session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            password: passwordInput.value,
          }),
        });
        const data = await response.json();

        if (response.ok) {
          AdminUI.toast("登录成功，正在跳转…", "success");
          setTimeout(() => (window.location.href = "/"), 500);
          return;
        }

        AdminUI.setHtml("login-result-area", AdminUI.resultHtml({
          title: "登录失败",
          tone: "error",
          description: data.detail || "请检查用户名和密码",
          json: data,
        }));
      } catch (err) {
        AdminUI.setHtml("login-result-area", AdminUI.resultHtml({
          title: "网络错误",
          tone: "error",
          description: String(err),
        }));
      } finally {
        btn.disabled = false;
        btn.textContent = "登录";
      }
    });

    // Enter key to submit
    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-submit").click();
    });
  </script>
</body>
</html>
