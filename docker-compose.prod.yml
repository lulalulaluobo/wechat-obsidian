services:
  wechat-md-server:
    image: your-namespace/wc-md-ob:v1.1
    container_name: wechat-md-server
    user: "0:0"
    restart: unless-stopped
    environment:
      WECHAT_MD_APP_MASTER_KEY: "replace-with-your-master-key"
      WECHAT_MD_ADMIN_USERNAME: "admin"
      WECHAT_MD_ADMIN_PASSWORD: "replace-with-your-admin-password"
      WECHAT_MD_SESSION_COOKIE_SECURE: "true"
      WECHAT_MD_RUNTIME_CONFIG_PATH: /app/data/runtime-config.json
      WECHAT_MD_DEFAULT_OUTPUT_DIR: /app/data/workdir-output
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/login', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
